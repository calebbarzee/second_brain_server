services:
  db:
    image: pgvector/pgvector:pg16
    container_name: secondbrain-db
    environment:
      POSTGRES_USER: secondbrain
      POSTGRES_PASSWORD: secondbrain
      POSTGRES_DB: secondbrain
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U secondbrain"]
      interval: 5s
      timeout: 5s
      retries: 5

  embeddings:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.6
    container_name: secondbrain-embeddings
    ports:
      - "8090:80"
    volumes:
      - embeddings-cache:/data
    command: ["--model-id", "BAAI/bge-base-en-v1.5"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  # Optional: uncomment for web-based DB inspection
  # pgadmin:
  #   image: dpage/pgadmin4
  #   container_name: secondbrain-pgadmin
  #   environment:
  #     PGADMIN_DEFAULT_EMAIL: admin@localhost.com
  #     PGADMIN_DEFAULT_PASSWORD: admin
  #   ports:
  #     - "5050:80"
  #   depends_on:
  #     db:
  #       condition: service_healthy

volumes:
  pgdata:
  embeddings-cache:
