services:
  db:
    image: pgvector/pgvector:pg16
    container_name: secondbrain-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-secondbrain}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secondbrain}
      POSTGRES_DB: ${POSTGRES_DB:-secondbrain}
    # No host port — only accessible from other containers on the internal network
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-secondbrain}"]
      interval: 5s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: secondbrain-ollama
    restart: unless-stopped
    # No host port — only accessible from other containers on the internal network
    volumes:
      - ollama-models:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: secondbrain-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-secondbrain}:${POSTGRES_PASSWORD:-secondbrain}@db:5432/${POSTGRES_DB:-secondbrain}
      WATCH_PATHS: /data/notes
      EMBEDDING_PRESET: ${EMBEDDING_PRESET:-nomic}
      EMBEDDING_URL: ${EMBEDDING_URL:-http://ollama:11434}
      RUST_LOG: ${RUST_LOG:-info}
      MCP_TRANSPORT: http
      MCP_HOST: 0.0.0.0
      MCP_PORT: "8080"
      TRACKED_BRANCH: ${TRACKED_BRANCH:-main}
      WORKTREE_DIR: /data/worktrees
      GIT_USER_NAME: ${GIT_USER_NAME:-secondbrain}
      GIT_USER_EMAIL: ${GIT_USER_EMAIL:-user@second-brain.local}
      AI_GIT_NAME: ${AI_GIT_NAME:-claude-ai}
      AI_GIT_EMAIL: ${AI_GIT_EMAIL:-ai@second-brain.local}
    ports:
      - "${MCP_PORT:-8080}:8080"
    volumes:
      - ${NOTES_PATH:-./test-notes}:/data/notes
      - worktrees:/data/worktrees

  # Optional: web-based DB admin
  # pgadmin:
  #   image: dpage/pgadmin4
  #   container_name: secondbrain-pgadmin
  #   restart: unless-stopped
  #   environment:
  #     PGADMIN_DEFAULT_EMAIL: admin@localhost.com
  #     PGADMIN_DEFAULT_PASSWORD: admin
  #   ports:
  #     - "${PGADMIN_PORT:-5050}:80"
  #   depends_on:
  #     db:
  #       condition: service_healthy

volumes:
  pgdata:
  ollama-models:
  worktrees:
